# File not found
inspection.location.target.file.not.found.display.name=OFBiz: File not found at target location
inspection.location.target.file.not.found.display.descriptor=OFBiz: The wanted file is not found at the specified location. This will result in error
inspection.location.target.file.not.found.use.quickfix.fixpath=Try to fix the file path to the most probable one
inspection.location.target.file.not.found.use.quickfix.createfile=Create file at this location
# cache on never cache
inspection.entity.cache.on.never.cache.display.name=OFBiz: cache call on never cache entity or View
inspection.entity.cache.on.never.cache.display.descriptor=OFBiz: The query will call cache, but the entity or view has never cache attribute. Cache will not be called anyway.
inspection.entity.remove.cache.quickfix=Remove the call to cache (it will be ignored anyway)

# cache on query count
inspection.entity.cache.on.count.display.name=OFBiz: Cache call on a query count
inspection.entity.cache.on.count.display.descriptor=OFBiz: There is a cache call on this query, but the query count ignores cache.

